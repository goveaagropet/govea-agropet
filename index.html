<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Govea Agropet</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', Arial, sans-serif;
background:#f3f4f6;
}

header{
background:white;
padding:20px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

header h1{
margin:0;
color:#2f5e2f;
font-size:32px;
}

.categorias{
display:flex;
justify-content:center;
gap:15px;
padding:20px;
}

.categorias button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
background:#e5e7eb;
}

.categorias .ativo{
background:#2f5e2f;
color:white;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
padding-bottom:120px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card img{
max-width:100%;
height:200px;
object-fit:contain;
}

.card h3{
margin:15px 0 5px;
}

.preco{
font-size:20px;
font-weight:bold;
color:#2f5e2f;
margin-bottom:15px;
}

.qtd{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.qtd button{
width:40px;
height:40px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.menos{
background:#e5e7eb;
}

.mais{
background:#2f5e2f;
color:white;
}

.barra{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

.total{
font-size:22px;
font-weight:bold;
}

.finalizar{
background:#2f5e2f;
color:white;
padding:15px 30px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>🐾 Govea Agropet</h1>
</header>

<div class="categorias">
<button class="ativo" onclick="filtrar('todos', this)">Todos</button>
<button onclick="filtrar('racao', this)">Rações</button>
<button onclick="filtrar('petisco', this)">Petiscos</button>
</div>

<div class="container" id="produtos"></div>

<div class="barra">
<div class="total" id="total">Total: R$ 0,00</div>
<button class="finalizar" onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<script>

let produtos = [
{nome:"Ração Premier 15kg", preco:199.90, categoria:"racao", img:"https://premierpet.com.br/wp-content/uploads/2020/07/premier_formula_caes_adultos_frango_15kg.png"},
{nome:"Ração Golden 10kg", preco:139.90, categoria:"racao", img:"https://premierpet.com.br/wp-content/uploads/2020/07/golden_formula_caes_adultos_frango_10kg.png"},
{nome:"Biscoito Golden 500g", preco:24.90, categoria:"petisco", img:"https://premierpet.com.br/wp-content/uploads/2020/07/golden_biscoito_caes_500g.png"}
];

let carrinho = [];

function carregar(filtro="todos"){
let area = document.getElementById("produtos");
area.innerHTML="";

produtos.forEach((p,i)=>{
if(filtro==="todos" || p.categoria===filtro){

area.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<div class="preco">R$ ${p.preco.toFixed(2).replace('.',',')}</div>
<div class="qtd">
<button class="menos" onclick="alterar(${i},-1)">−</button>
<span id="q${i}">0</span>
<button class="mais" onclick="alterar(${i},1)">+</button>
</div>
</div>
`;
}
});
}

function filtrar(cat, btn){
document.querySelectorAll(".categorias button").forEach(b=>b.classList.remove("ativo"));
btn.classList.add("ativo");
carregar(cat);
}

function alterar(i,valor){
if(!carrinho[i]){
carrinho[i]={...produtos[i], quantidade:0};
}

carrinho[i].quantidade += valor;
if(carrinho[i].quantidade<0) carrinho[i].quantidade=0;

document.getElementById("q"+i).innerText=carrinho[i].quantidade;
atualizarTotal();
}

function atualizarTotal(){
let total=0;
carrinho.forEach(item=>{
if(item && item.quantidade>0){
total+=item.preco*item.quantidade;
}
});
document.getElementById("total").innerText="Total: R$ "+total.toFixed(2).replace('.',',');
}

function finalizar(){

let numero="5565996715293"; // TROQUE AQUI

let msg="Olá Govea Agropet 🐾%0A%0APedido:%0A";
let total=0;

carrinho.forEach(item=>{
if(item && item.quantidade>0){
msg+=`- ${item.quantidade}x ${item.nome}%0A`;
total+=item.preco*item.quantidade;
}
});

if(total===0){
alert("Carrinho vazio!");
return;
}

msg+=`%0ATotal: R$ ${total.toFixed(2).replace('.',',')}`;

window.open(`https://wa.me/${numero}?text=${msg}`);
}

carregar();

</script>

</body>
</html>
